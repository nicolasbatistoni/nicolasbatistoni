name: Update README

on:
  workflow_dispatch: # permite disparo manual
  schedule:
    - cron: "0 12 * * *" # todos los días 12:00 UTC

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LOCALE: "es"
          COMMIT_MESSAGE: "chore: actualizar métricas del perfil"
          # GitHub-derived (con datos) — ON
          SHOW_SHORT_INFO: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_LOC_CHART: "True"
          SHOW_UPDATED_DATE: "True"
          # WakaTime-derived (sin datos hasta instalar el plugin) — OFF
          SHOW_TOTAL_CODE_TIME: "False"
          SHOW_LANGUAGE: "False"
          SHOW_EDITORS: "False"
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_PROFILE_VIEWS: "False"

      # SHOW_SHORT_INFO es todo-o-nada; quitamos solo la línea de storage
      # (mal formateada) conservando contribuciones y repos públicos/privados.
      - name: Ocultar línea de storage del bloque
        run: |
          git pull --no-rebase origin main
          if grep -q "Almacenamiento de GitHub utilizado" README.md; then
            sed -i '/Almacenamiento de GitHub utilizado/{N;d;}' README.md
            git config user.name "readme-bot"
            git config user.email "actions@github.com"
            git commit -am "chore: ocultar línea de storage del perfil"
            git push
          fi
